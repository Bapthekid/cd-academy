services:
  - type: web
    name: cd-academy
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:10000 --workers 4 --worker-class sync --timeout 30 --access-logfile - --error-logfile - app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: EMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false

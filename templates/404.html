{% extends "base.html" %}

{% block title %}Page Not Found - C&D Academy{% endblock %}

{% block content %}
<section class="error-section py-5">
    <div class="container">
        <div class="row">
            <div class="col-md-8 mx-auto text-center">
                <div class="error-container">
                    <h1 class="display-1 fw-bold error-code">404</h1>
                    <h2 class="mb-3">Page Not Found</h2>
                    <p class="lead mb-4">Sorry, the page you're looking for doesn't exist.</p>
                    <a href="{{ url_for('home') }}" class="btn btn-primary btn-lg">
                        Return to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
